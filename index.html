<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS Web Solutions | Client Access</title>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030712;
            --surface: rgba(17, 24, 39, 0.7);
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --border: rgba(255, 255, 255, 0.1);
            --grad: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --glass: blur(12px);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --surface: rgba(255, 255, 255, 0.7);
            --text-main: #0f172a;
            --text-dim: #475569;
            --border: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; transition: 0.3s; }

        /* Background Effects */
        #bg-canvas { position: fixed; inset: 0; z-index: -1; }
        #cursor-glow { width: 500px; height: 500px; background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%); position: fixed; pointer-events: none; z-index: -1; transform: translate(-50%, -50%); transition: 0.1s; }

        .auth-container { width: 1000px; max-width: 95%; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; z-index: 10; }

        /* Left Side */
        .info-panel h1 { font-size: 3rem; font-weight: 800; margin-bottom: 20px; line-height: 1.1; }
        .info-panel h1 span { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .info-panel p { color: var(--text-dim); line-height: 1.6; margin-bottom: 30px; font-size: 1.1rem; }
        .feature-list { list-style: none; }
        .feature-list li { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; font-weight: 600; color: var(--text-main); }
        .feature-list i { color: var(--primary); font-size: 1.2rem; }

        /* Right Side Card */
        .auth-card { background: var(--surface); backdrop-filter: var(--glass); border: 1px solid var(--border); border-radius: 32px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        .tabs { display: flex; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 5px; margin-bottom: 30px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: 700; transition: 0.3s; color: var(--text-dim); }
        .tab.active { background: var(--grad); color: white; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; color: var(--text-dim); }
        .input-box { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: white; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--grad); color: white; margin-top: 10px; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-google { background: white; color: #000; margin-top: 15px; }

        .toggle-theme { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 25px; border-radius: 50px; color: white; font-weight: 600; display: none; z-index: 100; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }

        @media (max-width: 900px) {
            .auth-container { grid-template-columns: 1fr; text-align: center; margin-top: 50px; }
            .info-panel { display: none; }
        }
    </style>
</head>
<body id="body">

    <canvas id="bg-canvas"></canvas>
    <div id="cursor-glow"></div>

    <button class="toggle-theme" id="theme-btn">
        <i class="fas fa-moon"></i>
    </button>

    <div class="auth-container">
        <!-- Section Left -->
        <div class="info-panel">
            <h1>AS <span>Web Solutions</span></h1>
            <p>Access your projects, premium demos, website services, offers and support in one secure place.</p>
            <ul class="feature-list">
                <li><i class="fas fa-headset"></i> Premium 24/7 Support</li>
                <li><i class="fas fa-rocket"></i> Real-time Project Tracking</li>
                <li><i class="fas fa-shield-halved"></i> Secure Multi-factor Login</li>
                <li><i class="fas fa-gamepad"></i> Game Center Access</li>
            </ul>
        </div>

        <!-- Section Right -->
        <div class="auth-card">
            <div class="tabs">
                <div class="tab active" id="tab-login">Login</div>
                <div class="tab" id="tab-signup">Register</div>
            </div>

            <form id="auth-form">
                <div id="name-field" style="display: none;" class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" class="input-box" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="input-box" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="input-box" placeholder="••••••••" required>
                </div>
                
                <p id="forgot-pass" style="text-align: right; font-size: 0.8rem; color: var(--primary); cursor: pointer; margin-bottom: 15px;">Forgot Password?</p>

                <button type="submit" class="btn btn-primary" id="submit-btn">Login to Account</button>
                
                <div style="display: flex; align-items: center; margin: 20px 0; color: var(--text-dim); font-size: 0.8rem;">
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                    <span style="padding: 0 10px;">OR</span>
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                </div>

                <button type="button" class="btn btn-google" id="google-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.png" width="18"> Continue with Google
                </button>
            </form>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            GoogleAuthProvider, 
            signInWithPopup, 
            onAuthStateChanged,
            updateProfile,
            sendPasswordResetEmail 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPlPY3Da0wNXUUXShdFZggt81hKztAiRI",
            authDomain: "aswebsolutions-4401b.firebaseapp.com",
            projectId: "aswebsolutions-4401b",
            storageBucket: "aswebsolutions-4401b.firebasestorage.app",
            messagingSenderId: "1085988134291",
            appId: "1:1085988134291:web:3f4f6f3a0a5652d2ce9c66",
            measurementId: "G-D8TM1S52E6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 9. Session Check
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "home.html";
            }
        });

        // 10. Theme Handling
        const themeBtn = document.getElementById('theme-btn');
        const loadTheme = () => {
            const saved = localStorage.getItem('as_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            themeBtn.innerHTML = saved === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        };
        loadTheme();

        themeBtn.onclick = () => {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('as_theme', target);
            themeBtn.innerHTML = target === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        };

        // Tab Switching
        let isLogin = true;
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const nameField = document.getElementById('name-field');
        const submitBtn = document.getElementById('submit-btn');

        tabLogin.onclick = () => {
            isLogin = true;
            tabLogin.classList.add('active');
            tabSignup.classList.remove('active');
            nameField.style.display = 'none';
            submitBtn.innerText = 'Login to Account';
        };

        tabSignup.onclick = () => {
            isLogin = false;
            tabSignup.classList.add('active');
            tabLogin.classList.remove('active');
            nameField.style.display = 'block';
            submitBtn.innerText = 'Create Account';
        };

        // 8. Improved Error Parsing
        const parseError = (code) => {
            switch(code) {
                case 'auth/invalid-credential': return "Invalid email or password.";
                case 'auth/popup-closed-by-user': return "Google login popup was closed.";
                case 'auth/popup-blocked': return "Popup blocked. Please allow popups.";
                case 'auth/account-exists-with-different-credential': return "Account already exists with another login method.";
                case 'auth/too-many-requests': return "Too many attempts. Please try again later.";
                case 'auth/operation-not-allowed': return "This login method is not enabled in Firebase.";
                case 'auth/user-not-found': return "User not found.";
                case 'auth/wrong-password': return "Incorrect password.";
                case 'auth/email-already-in-use': return "Email already registered.";
                default: return "Authentication failed. Try again.";
            }
        };

        const showToast = (msg, color = "#ef4444") => {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            t.style.background = color;
            t.innerText = msg;
            setTimeout(() => t.style.display = 'none', 4000);
        };

        // Auth Form Submission
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('reg-name').value;

            try {
                if(isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                    // Redirect handled by onAuthStateChanged
                } else {
                    // 5. Register with updateProfile
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(cred.user, { displayName: name });
                    
                    localStorage.setItem('as_user_name', name);
                    localStorage.setItem('as_user_email', email);
                    window.location.href = "home.html";
                }
            } catch (err) {
                showToast(parseError(err.code));
            }
        };

        // 6. Google Login
        document.getElementById('google-btn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                localStorage.setItem('as_user_name', result.user.displayName || 'Client');
                localStorage.setItem('as_user_email', result.user.email);
                localStorage.setItem('as_user_photo', result.user.photoURL || '');
                window.location.href = "home.html";
            } catch (err) {
                // 7. Improved Google Errors
                if(err.code === 'auth/popup-closed-by-user') showToast("Google login popup was closed.");
                else if(err.code === 'auth/popup-blocked') showToast("Popup blocked. Please allow popups and try again.");
                else showToast(parseError(err.code));
            }
        };

        // 11. Forgot Password
        document.getElementById('forgot-pass').onclick = async () => {
            const email = document.getElementById('email').value;
            if(!email) return showToast("Please enter email first");
            try {
                await sendPasswordResetEmail(auth, email);
                showToast("Password reset link sent successfully. Please check your email.", "#10b981");
            } catch (err) {
                showToast(parseError(err.code));
            }
        };

        // UI Interactions
        const glow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // Background Particles
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class P {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.s = Math.random() * 2;
                this.vx = Math.random() * 0.5 - 0.25;
                this.vy = Math.random() * 0.5 - 0.25;
            }
            draw() {
                ctx.fillStyle = "rgba(59, 130, 246, 0.4)";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill();
            }
            move() {
                this.x += this.vx; this.y += this.vy;
                if(this.x<0 || this.x>canvas.width) this.vx *= -1;
                if(this.y<0 || this.y>canvas.height) this.vy *= -1;
            }
        }
        for(let i=0; i<80; i++) particles.push(new P());
        function anim() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.move(); p.draw(); });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
